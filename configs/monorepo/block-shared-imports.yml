# Block relative imports to shared module (enforce path alias)
# P1
#
# Uses git diff --cached directly (scans file content, not file args).

pre-commit:
  scripts:
    "block-shared-imports.sh":
      runner: sh
      glob: "*.ts"
      env:
        BLOCKED_IMPORT_PATTERN: 'from ["\x27](\.\./)+shared/'
        ALIAS: "@mdt/shared"
