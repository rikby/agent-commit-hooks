# Block auto-generated artifacts from being committed
# P1 — code hygiene
#
# Configurable via BLOCK_PATTERNS env var (comma-separated glob patterns).
# Default: common build/tool artifacts + OS metadata.
#
# Lefthook passes staged files as arguments ($@) automatically.

pre-commit:
  scripts:
    "block-generated-files.sh":
      runner: sh
      env:
        BLOCK_PATTERNS: "*.trace.md,*.min.js,*.min.css,*.generated.ts,*.map,*.log,.DS_Store,Thumbs.db"
