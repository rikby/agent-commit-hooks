# Block private keys, certificates, and credential files
# P0 — secrets leak prevention (binary secrets, not text config)

pre-commit:
  commands:
    block-credential-files:
      glob: "*.{pem,key,p12,pfx,jks,keystore,credential,gpg,asc,pub}"
      run: |
        for f in {staged_files}; do
          echo "❌ Error: Attempting to commit credential file: $f"
          echo "Private keys and certificates must never be committed."
          echo "Use environment variables or a secrets manager instead."
          exit 1
        done

    # Also catch by exact name regardless of extension
    block-credential-names:
      run: |
        blocked=$(echo "{staged_files}" | grep -iE '(id_rsa|id_ed25519|id_ecdsa|id_dsa|\.ssh/|known_hosts)' || true)
        if [ -n "$blocked" ]; then
          for f in $blocked; do
            echo "❌ Error: Attempting to commit SSH key / credential: $f"
            exit 1
          done
        fi
